<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUREM Lezzet Menüsü</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .menu-header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1544025162-d76694265947') no-repeat center center;
            background-size: cover;
            color: white;
            padding: 5px 0;
            text-align: center;
            margin-bottom: 25px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            height: 100%;
        }

            .card:hover {
                transform: translateY(-5px);
            }

        .product-img {
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .price-badge {
            background-color: #dc3545;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 20px;
            padding: 5px 15px;
        }
        /* Kategori buton stilleri */
        .btn-category {
            border-radius: 25px;
            font-weight: 600;
            padding: 10px 25px;
            margin: 5px;
            border: 2px solid #dc3545;
            color: #dc3545;
            background: transparent;
            transition: all 0.3s;
        }

            .btn-category.active, .btn-category:hover {
                background-color: #dc3545;
                color: white;
            }
    </style>
</head>
<body>

    <div class="menu-header">
        <h1 class="fw-bold m-0">NUREM RESTORAN</h1>
        <p class="lead m-0 mt-1">Geleneksel Lezzetlerin Dijital Adresi</p>
    </div>

    <!-- Kategori Seçim Butonları -->
    <div class="container text-center mb-4">
        <button class="btn btn-category active" onclick="filtrele(0, this)">✨ Tüm Menü</button>
        <button class="btn btn-category" onclick="filtrele(1, this)">🍖 Yemekler</button>
        <button class="btn btn-category" onclick="filtrele(2, this)">🥤 İçecekler</button>
        <button class="btn btn-category" onclick="filtrele(3, this)">🍰 Tatlılar</button>
    </div>

    <div class="container mb-5">
        <div id="menu-loading" class="text-center my-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2 text-muted">Lezzetler hazırlanıyor...</p>
        </div>

        <div class="row g-4" id="menu-container">
            <!-- Ürünler buraya akacak -->
        </div>
    </div>

    <script>
        let tumUrunler = []; // API'den gelen veriyi burada saklayacağız

        document.addEventListener("DOMContentLoaded", function () {
            fetch('/api/Menu/getir')
                .then(response => response.json())
                .then(data => {
                    tumUrunler = data;
                    document.getElementById('menu-loading').style.display = 'none';
                    ekranaBas(tumUrunler); // İlk açılışta hepsini göster
                })
                .catch(error => {
                    console.error("Hata:", error);
                    document.getElementById('menu-loading').innerHTML = "<p class='text-danger'>Menü yüklenemedi.</p>";
                });
        });

        // Ürünleri HTML olarak ekrana basan fonksiyon
        function ekranaBas(liste) {
            const container = document.getElementById('menu-container');
            container.innerHTML = ""; // Önceki basılanları temizle

            if (liste.length === 0) {
                container.innerHTML = "<div class='text-center text-muted my-4'>Bu kategoride ürün bulunamadı.</div>";
                return;
            }

            liste.forEach(urun => {
                const urunKartı = `
                        <div class="col-md-4 col-sm-6 animate-fade">
                            <div class="card">
                                <img src="${urun.imageUrl}" class="card-img-top product-img" alt="${urun.name}">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <div>
                                        <h5 class="card-title fw-bold">${urun.name}</h5>
                                        <p class="card-text text-muted" style="font-size:0.9rem;">${urun.description}</p>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="price-badge">${urun.price} ₺</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                container.innerHTML += urunKartı;
            });
        }

        // Butonlara tıklandığında filtreleme yapan fonksiyon
        function filtrele(categoryId, buton) {
            // Aktif buton görselini değiştir
            document.querySelectorAll('.btn-category').forEach(b => b.classList.remove('active'));
            buton.classList.add('active');

            if (categoryId === 0) {
                ekranaBas(tumUrunler); // Hepsini göster
            } else {
                const filtrelenmiş = tumUrunler.filter(u => u.categoryId === categoryId);
                ekranaBas(filtrelenmiş); // Sadece seçilen kategoriyi göster
            }
        }
    </script>
</body>
</html>
